<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Moja lista zadań</title>

    <!-- Podłączamy plik CSS, który odpowiada za wygląd -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nagłówek strony -->
    <h1>Lista zadań</h1>

    <!-- Pole do wpisania zadania -->
    <input id="taskInput" type="text" placeholder="Wpisz zadanie">

    <!-- Przycisk, który uruchamia funkcję addTask() -->
    <button onclick="addTask()">Dodaj</button>

    <!-- Lista, do której będą dodawane zadania -->
    <ul id="taskList"></ul>

    <!-- Podłączamy plik JavaScript, który steruje działaniem -->
    <script src="script.js"></script>
</body>
</html>
